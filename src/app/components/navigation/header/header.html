<header class="fixed top-0 left-0 right-0 dark:bg-(--fg) shadow-md z-50">
  <div class="container mx-auto">
    <nav class="flex items-center justify-between px-4 py-3 relative">
      <!-- Logo -->
      <app-logo></app-logo>

      <!-- Desktop navigation -->
      <div class="hidden md:flex md:items-center md:gap-8 md:mx-auto">
        <app-navbar></app-navbar>
      </div>

      <!-- right section -->
      <div class="flex items-center gap-4 ml-auto">
        <!-- dark/light mode toggle -->
        <app-theme-icon></app-theme-icon>
        <!-- Browse Recipes button -->
        <app-button
          btnText="Browse Recipes"
          classes="hidden"
          (click)="navigateToRecipes()"
        ></app-button>
      </div>

      <!-- Mobile menu button -->
      <button
        (click)="toggleMenu()"
        class="md:hidden p-2 rounded-lg hover:bg-(--text)/10 focus:outline-none relative w-10 h-10 overflow-hidden cursor-pointer"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Toggle menu"
      >
        <!-- Menu icon (three lines) -->
        <svg
          class="w-6 h-6 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-in-out"
          [class.opacity-0]="isMenuOpen"
          [class.rotate-0]="!isMenuOpen"
          [class.-rotate-90]="isMenuOpen"
          [class.scale-0]="isMenuOpen"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          />
        </svg>
        <!-- Close icon (X) -->
        <svg
          class="w-6 h-6 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-in-out"
          [class.opacity-0]="!isMenuOpen"
          [class.rotate-90]="!isMenuOpen"
          [class.rotate-0]="isMenuOpen"
          [class.scale-0]="!isMenuOpen"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>

      <!-- Mobile navigation -->
      <div
        class="fixed md:hidden top-[61px] right-0 bottom-0 w-64 bg-(--fg) shadow-lg transform transition-transform duration-300 ease-in-out"
        [class.translate-x-0]="isMenuOpen"
        [class.translate-x-full]="!isMenuOpen"
      >
        <div class="p-4 flex flex-col gap-4">
          <app-navbar></app-navbar>
          <button
            class="bg-green-900 text-gray-100 rounded-md px-4 py-2 hover:bg-green-800 transition-colors cursor-pointer"
            [routerLink]="['/recipes']"
          >
            Browse Recipes
          </button>
        </div>
      </div>
    </nav>
  </div>
</header>

<!-- Spacer to prevent content from being hidden under fixed header -->
<div class="h-[61px]"></div>
