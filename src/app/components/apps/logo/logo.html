<h1 class="font-bold text-xl text-(--primary) flex items-center gap-3">
  <div class="relative w-10 h-10">
    <svg
      viewBox="0 0 40 40"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      class="w-full h-full"
    >
      <!-- Animated gradient background -->
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop
            offset="0%"
            class="text-orange-500"
            style="stop-color: currentColor; stop-opacity: 0.1"
          >
            <animate
              attributeName="stop-opacity"
              values="0.1; 0.3; 0.1"
              dur="3s"
              repeatCount="indefinite"
            />
          </stop>
          <stop
            offset="100%"
            class="text-(--primary)"
            style="stop-color: currentColor; stop-opacity: 0.1"
          >
            <animate
              attributeName="stop-opacity"
              values="0.1; 0.3; 0.1"
              dur="3s"
              repeatCount="indefinite"
              begin="-1.5s"
            />
          </stop>
        </linearGradient>
      </defs>

      <!-- Base circle with gradient -->
      <circle cx="20" cy="20" r="19" fill="url(#grad1)" />

      <!-- Fork handle base -->
      <path
        d="M20 15v15"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        class="text-orange-500 origin-bottom"
      >
        <animate
          attributeName="stroke-width"
          values="2.5;3;2.5"
          dur="3s"
          repeatCount="indefinite"
        />
      </path>

      <!-- Stylized leaf/heart fork head -->
      <path
        d="M20 15C20 15 20 10 15 10C10 10 10 15 10 15C10 20 20 25 20 25C20 25 30 20 30 15C30 15 30 10 25 10C20 10 20 15 20 15Z"
        fill="currentColor"
        class="text-orange-500"
        opacity="0.9"
      >
        <animate
          attributeName="opacity"
          values="0.9;1;0.9"
          dur="3s"
          repeatCount="indefinite"
        />
      </path>

      <!-- Decorative leaves -->
      <path
        d="M26 28C26 28 32 25 32 20"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        class="text-(--primary)"
      >
        <animate
          attributeName="d"
          values="M26 28C26 28 32 25 32 20;M26 28C26 28 33 24 32 19;M26 28C26 28 32 25 32 20"
          dur="5s"
          repeatCount="indefinite"
        />
      </path>

      <path
        d="M14 28C14 28 8 25 8 20"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        class="text-(--primary)"
      >
        <animate
          attributeName="d"
          values="M14 28C14 28 8 25 8 20;M14 28C14 28 7 24 8 19;M14 28C14 28 8 25 8 20"
          dur="5s"
          repeatCount="indefinite"
        />
      </path>

      <!-- Small dots -->
      <circle
        cx="28"
        cy="22"
        r="1"
        fill="currentColor"
        class="text-(--primary)"
      >
        <animate
          attributeName="r"
          values="1;1.5;1"
          dur="3s"
          repeatCount="indefinite"
        />
      </circle>
      <circle
        cx="12"
        cy="22"
        r="1"
        fill="currentColor"
        class="text-(--primary)"
      >
        <animate
          attributeName="r"
          values="1;1.5;1"
          dur="3s"
          repeatCount="indefinite"
          begin="-1.5s"
        />
      </circle>
    </svg>
  </div>
  <span
    class="hidden sm:inline-block md:hidden lg:inline-block bg-linear-to-r from-orange-500 to-(--primary) bg-clip-text text-transparent"
  >
    Healthy Recipe Finder
  </span>
</h1>
